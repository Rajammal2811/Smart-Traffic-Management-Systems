spring:
  application:
    name: smart-traffic-management
  datasource:
    url: jdbc:mysql://localhost:3306/traffic_management?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  mvc:
    static-path-pattern: /static/**
    resources:
      static-locations: classpath:/static/

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.traffic: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'