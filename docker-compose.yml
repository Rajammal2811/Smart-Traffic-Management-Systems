version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: traffic_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: traffic_management_db
      MYSQL_USER: traffic_user
      MYSQL_PASSWORD: traffic_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot Application
  app:
    build: .
    container_name: traffic_app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/traffic_management_db
      SPRING_DATASOURCE_USERNAME: traffic_user
      SPRING_DATASOURCE_PASSWORD: traffic_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
